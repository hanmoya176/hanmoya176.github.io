; иҮӘеҠЁжөӢйҖҹ - еӨҡдёӘжөӢиҜ•зӣ®ж ҮеҲҶж•ЈйЈҺйҷ©пјҢйҒҝе…ҚеҚ•зӮ№ж•…йҡң
; Google зұ»жңҚеҠЎз”Ё google.com жөӢпјҢиғҪзңҹе®һеҸҚжҳ д»ЈзҗҶеҸҜз”ЁжҖ§
custom_proxy_group=вҷҫпёҸ иҮӘеҠЁйҖүжӢ©`url-test`.*`http://www.google.com/generate_204`3600,,70

; Apple - иө°зӣҙиҝһ
custom_proxy_group=рҹҚҺ Apple`select`[]DIRECT

; еҫ®иҪҜ - иө°зӣҙиҝһпјҲCDN еңЁеӣҪеҶ…жңүиҠӮзӮ№пјү
